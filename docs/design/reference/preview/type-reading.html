<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>

</style></head><body><div class="card" style="min-height:180px"><div style="display:flex;flex-direction:column;gap:12px"><div class="lab">Reading · Noto Sans SC · 18 / 1.95 · serif option ↓</div><p style="font-family:var(--fr);font-size:18px;line-height:1.9;color:var(--ink);max-width:60ch">把每天读到的、想到的，慢慢写下来。The quiet web, one page at a time——一个加载很快、读起来安静的地方。</p><p style="font-family:Newsreader,Georgia,serif;font-size:18px;line-height:1.8;color:var(--ink-2)">Serif option · 「克制」不是少做，而是把每一次「多做」的冲动放一晚上。</p></div></div></body></html>
