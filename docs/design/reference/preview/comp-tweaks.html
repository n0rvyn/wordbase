<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#FBFAF8;--surface:#FFFFFF;--surface-2:#F4F2EC;--surface-3:#ECE8DF;--ink:#15151A;--ink-2:#54545D;--ink-3:#92929B;--ink-4:#BDBBB3;--line:#E7E2D9;--line-2:#D7D2C7;--accent:#3457B6;--on-accent:#fff;--accent-soft:color-mix(in srgb,#3457B6 10%,#fff);--ease:cubic-bezier(.32,.72,0,1);--shadow:0 1px 2px rgba(20,20,26,.04),0 30px 60px -34px rgba(20,20,26,.28);
--fd:"Geist","Noto Sans SC",system-ui,sans-serif;--fr:"Noto Sans SC","Geist",system-ui,sans-serif;--fm:"Geist Mono",ui-monospace,monospace;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--fd);-webkit-font-smoothing:antialiased;}
.card{padding:24px 26px;}
.lab{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.mono{font-family:var(--fm);}
</style></head><body><div class="card" style="min-height:200px"><div style="display:flex;gap:24px;align-items:flex-start"><div style="width:248px;background:var(--surface);border:1px solid var(--line-2);border-radius:18px;box-shadow:var(--shadow);padding:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-family:var(--fd);font-weight:600;font-size:15px">Tweaks</span><span style="width:24px;height:24px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;color:var(--ink-3);font-size:13px">✕</span></div><div class="lab" style="margin-bottom:8px">Theme</div><div style="display:flex;background:var(--surface-2);border-radius:9px;padding:3px;gap:2px;margin-bottom:14px"><span style="flex:1;text-align:center;font-size:12px;padding:6px;border-radius:6px;background:var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.1)">浅色</span><span style="flex:1;text-align:center;font-size:12px;padding:6px;color:var(--ink-3)">深色</span></div><div class="lab" style="margin-bottom:8px">Accent</div><div style="display:flex;gap:8px"><span style="width:26px;height:26px;border-radius:50%;background:#3457B6;box-shadow:0 0 0 2px var(--surface),0 0 0 3px var(--ink-3)"></span><span style="width:26px;height:26px;border-radius:50%;background:#2C4EE0;"></span><span style="width:26px;height:26px;border-radius:50%;background:#0E7C66;"></span><span style="width:26px;height:26px;border-radius:50%;background:#3F3F46;"></span><span style="width:26px;height:26px;border-radius:50%;background:#B4612A;"></span></div></div><div style="flex:1;padding-top:8px"><div class="lab" style="margin-bottom:8px">In-page tweaks</div><div style="font-family:var(--fr);font-size:13.5px;color:var(--ink-2);line-height:1.6">Theme · accent · reading font.<br>Persisted to <code class="mono" style="font-size:12px;background:var(--surface-2);padding:1px 6px;border-radius:5px">norvyn-v2</code>, synced across every page.</div></div></div></div></body></html>
