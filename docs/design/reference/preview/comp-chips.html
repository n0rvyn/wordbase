<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#FBFAF8;--surface:#FFFFFF;--surface-2:#F4F2EC;--surface-3:#ECE8DF;--ink:#15151A;--ink-2:#54545D;--ink-3:#92929B;--ink-4:#BDBBB3;--line:#E7E2D9;--line-2:#D7D2C7;--accent:#3457B6;--on-accent:#fff;--accent-soft:color-mix(in srgb,#3457B6 10%,#fff);--ease:cubic-bezier(.32,.72,0,1);--shadow:0 1px 2px rgba(20,20,26,.04),0 30px 60px -34px rgba(20,20,26,.28);
--fd:"Geist","Noto Sans SC",system-ui,sans-serif;--fr:"Noto Sans SC","Geist",system-ui,sans-serif;--fm:"Geist Mono",ui-monospace,monospace;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--fd);-webkit-font-smoothing:antialiased;}
.card{padding:24px 26px;}
.lab{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.mono{font-family:var(--fm);}
</style></head><body><div class="card" style="min-height:130px"><div style="display:flex;flex-direction:column;gap:14px"><div class="lab">Filter chips · one selected</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button style="font-family:var(--fm);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:8px 15px;cursor:pointer;background:var(--accent);color:var(--on-accent);border:1px solid var(--accent)">全部</button><button style="font-family:var(--fm);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:8px 15px;cursor:pointer;background:transparent;color:var(--ink-2);border:1px solid var(--line-2)">设计</button><button style="font-family:var(--fm);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:8px 15px;cursor:pointer;background:transparent;color:var(--ink-2);border:1px solid var(--line-2)">工程</button><button style="font-family:var(--fm);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:8px 15px;cursor:pointer;background:transparent;color:var(--ink-2);border:1px solid var(--line-2)">随笔</button><button style="font-family:var(--fm);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:8px 15px;cursor:pointer;background:transparent;color:var(--ink-2);border:1px solid var(--line-2)">复盘</button></div></div></div></body></html>
