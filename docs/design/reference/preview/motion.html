<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#FBFAF8;--surface:#FFFFFF;--surface-2:#F4F2EC;--surface-3:#ECE8DF;--ink:#15151A;--ink-2:#54545D;--ink-3:#92929B;--ink-4:#BDBBB3;--line:#E7E2D9;--line-2:#D7D2C7;--accent:#3457B6;--on-accent:#fff;--accent-soft:color-mix(in srgb,#3457B6 10%,#fff);--ease:cubic-bezier(.32,.72,0,1);--shadow:0 1px 2px rgba(20,20,26,.04),0 30px 60px -34px rgba(20,20,26,.28);
--fd:"Geist","Noto Sans SC",system-ui,sans-serif;--fr:"Noto Sans SC","Geist",system-ui,sans-serif;--fm:"Geist Mono",ui-monospace,monospace;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--fd);-webkit-font-smoothing:antialiased;}
.card{padding:24px 26px;}
.lab{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.mono{font-family:var(--fm);}
</style></head><body><div class="card" style="min-height:160px"><div style="display:flex;flex-direction:column;gap:12px"><div class="lab">Motion · one easing</div><code class="mono" style="font-size:12px;color:var(--accent)">--ease: cubic-bezier(.32,.72,0,1)</code><div style="display:flex;gap:0;flex-direction:column"><div style="display:flex;align-items:baseline;gap:14px;padding:5px 0;"><code class="mono" style="font-size:11px;width:64px">quick</code><span class="mono" style="font-size:11px;color:var(--ink-3);width:60px">150ms</span><span style="font-size:12.5px;color:var(--ink-2)">toggles</span></div><div style="display:flex;align-items:baseline;gap:14px;padding:5px 0;border-top:1px solid var(--line)"><code class="mono" style="font-size:11px;width:64px">base</code><span class="mono" style="font-size:11px;color:var(--ink-3);width:60px">200ms</span><span style="font-size:12.5px;color:var(--ink-2)">hover</span></div><div style="display:flex;align-items:baseline;gap:14px;padding:5px 0;border-top:1px solid var(--line)"><code class="mono" style="font-size:11px;width:64px">slow</code><span class="mono" style="font-size:11px;color:var(--ink-3);width:60px">300ms</span><span style="font-size:12.5px;color:var(--ink-2)">row reveal</span></div><div style="display:flex;align-items:baseline;gap:14px;padding:5px 0;border-top:1px solid var(--line)"><code class="mono" style="font-size:11px;width:64px">theme</code><span class="mono" style="font-size:11px;color:var(--ink-3);width:60px">400ms</span><span style="font-size:12.5px;color:var(--ink-2)">light↔dark</span></div></div></div></div></body></html>
