<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#FBFAF8;--surface:#FFFFFF;--surface-2:#F4F2EC;--surface-3:#ECE8DF;--ink:#15151A;--ink-2:#54545D;--ink-3:#92929B;--ink-4:#BDBBB3;--line:#E7E2D9;--line-2:#D7D2C7;--accent:#3457B6;--on-accent:#fff;--accent-soft:color-mix(in srgb,#3457B6 10%,#fff);--ease:cubic-bezier(.32,.72,0,1);--shadow:0 1px 2px rgba(20,20,26,.04),0 30px 60px -34px rgba(20,20,26,.28);
--fd:"Geist","Noto Sans SC",system-ui,sans-serif;--fr:"Noto Sans SC","Geist",system-ui,sans-serif;--fm:"Geist Mono",ui-monospace,monospace;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--fd);-webkit-font-smoothing:antialiased;}
.card{padding:24px 26px;}
.lab{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.mono{font-family:var(--fm);}
</style></head><body><div class="card" style="min-height:210px"><div style="display:flex;flex-direction:column;gap:0"><div style="display:flex;align-items:center;gap:14px;padding:9px 0;"><span style="width:16px;height:16px;border-radius:4px;background:#3457B6;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--accent</code><span style="font-size:13px;color:var(--ink-2);flex:1">primary action</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#3457B6</span></div><div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--line)"><span style="width:16px;height:16px;border-radius:4px;background:#15151A;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--ink</code><span style="font-size:13px;color:var(--ink-2);flex:1">primary text</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#15151A</span></div><div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--line)"><span style="width:16px;height:16px;border-radius:4px;background:#54545D;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--ink-2</code><span style="font-size:13px;color:var(--ink-2);flex:1">secondary text</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#54545D</span></div><div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--line)"><span style="width:16px;height:16px;border-radius:4px;background:#92929B;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--ink-3</code><span style="font-size:13px;color:var(--ink-2);flex:1">muted / meta</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#92929B</span></div><div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--line)"><span style="width:16px;height:16px;border-radius:4px;background:#E7E2D9;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--line</code><span style="font-size:13px;color:var(--ink-2);flex:1">hairline divider</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#E7E2D9</span></div><div style="display:flex;align-items:center;gap:14px;padding:9px 0;border-top:1px solid var(--line)"><span style="width:16px;height:16px;border-radius:4px;background:#F4F2EC;box-shadow:inset 0 0 0 1px rgba(120,120,120,.2);flex-shrink:0"></span><code class="mono" style="font-size:11.5px;color:var(--ink);width:120px">--surface-2</code><span style="font-size:13px;color:var(--ink-2);flex:1">subtle fill</span><span class="mono" style="font-size:10.5px;color:var(--ink-3)">#F4F2EC</span></div></div></div></body></html>
