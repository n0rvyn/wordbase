<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--paper:#FBFAF8;--surface:#FFFFFF;--surface-2:#F4F2EC;--surface-3:#ECE8DF;--ink:#15151A;--ink-2:#54545D;--ink-3:#92929B;--ink-4:#BDBBB3;--line:#E7E2D9;--line-2:#D7D2C7;--accent:#3457B6;--on-accent:#fff;--accent-soft:color-mix(in srgb,#3457B6 10%,#fff);--ease:cubic-bezier(.32,.72,0,1);--shadow:0 1px 2px rgba(20,20,26,.04),0 30px 60px -34px rgba(20,20,26,.28);
--fd:"Geist","Noto Sans SC",system-ui,sans-serif;--fr:"Noto Sans SC","Geist",system-ui,sans-serif;--fm:"Geist Mono",ui-monospace,monospace;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--fd);-webkit-font-smoothing:antialiased;}
.card{padding:24px 26px;}
.lab{font-family:var(--fm);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
.mono{font-family:var(--fm);}
</style></head><body><div class="card" style="min-height:150px"><div style="display:flex;flex-direction:column;gap:16px"><div class="lab">Buttons · primary / ghost / link</div><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button style="font-family:var(--fd);font-size:15px;font-weight:600;padding:12px 20px;border:none;border-radius:999px;background:var(--accent);color:var(--on-accent);box-shadow:var(--shadow);cursor:pointer;display:inline-flex;gap:8px;align-items:center">开始阅读</button><button style="font-family:var(--fd);font-size:15px;font-weight:600;padding:12px 20px;border:1px solid var(--line-2);border-radius:999px;background:transparent;color:var(--ink);cursor:pointer">订阅更新</button><a style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--accent);text-decoration:underline;text-underline-offset:3px">查看归档 →</a><button style="font-family:var(--fd);font-size:13px;font-weight:600;padding:9px 16px;border:1px solid var(--line-2);border-radius:999px;background:transparent;color:var(--ink);cursor:pointer;display:inline-flex;gap:6px;align-items:center">App Store <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg></button></div></div></div></body></html>
